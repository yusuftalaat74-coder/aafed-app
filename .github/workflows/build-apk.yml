name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Generate app icon (AAFED logo)
        run: npx @capacitor/assets generate --android --iconBackgroundColor "#0E3449" --splashBackgroundColor "#0E3449" || echo "assets step skipped"

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk AAFED.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AAFED-apk
          path: AAFED.apk

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: AAFED App (آخر نسخة)
          files: AAFED.apk
