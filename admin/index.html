<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة إدارة AAFED</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#0E3449; --navy2:#16475C; --green:#2E7D43; --greenL:#e8f3ec;
    --lime:#8DC044; --gold:#cf9a33; --bg:#f3f5f6; --line:#e4e9ec; --ink:#1f2b33; --muted:#74838c; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Tajawal",sans-serif}
  body{background:var(--bg);color:var(--ink);display:flex;min-height:100vh}
  aside{width:230px;background:var(--navy);color:#fff;padding:18px 12px;flex:0 0 auto;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;margin-bottom:18px;padding:0 6px}
  .brand .logo{width:34px;height:34px;border-radius:50%;background:var(--lime);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800}
  nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;color:#cdd9e0;cursor:pointer;font-weight:600;font-size:14px;margin-bottom:3px}
  nav a.on,nav a:hover{background:rgba(255,255,255,.12);color:#fff}
  main{flex:1;padding:22px 26px;overflow:auto}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  h1{font-size:22px;color:var(--navy)}
  .api{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .api input{border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:inherit;width:240px}
  .btn{background:var(--green);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer;font-family:inherit}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}
  .kpi .n{font-size:24px;font-weight:800;color:var(--navy)}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:2px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px}
  .card h2{font-size:15px;color:var(--navy);margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  .pill{padding:3px 11px;border-radius:30px;font-size:11px;font-weight:800;display:inline-block}
  .ok{background:var(--greenL);color:var(--green)} .warn{background:#fbecd2;color:#9a6b12}
  .bad{background:#fde2e2;color:#c0392b} .info{background:#e6eef3;color:var(--navy)}
  .bar{height:8px;background:var(--line);border-radius:5px;overflow:hidden;width:120px;display:inline-block;vertical-align:middle}
  .bar i{display:block;height:100%;background:var(--green)}
  .empty{color:var(--muted);font-size:13px;padding:8px}
  .alert{display:flex;align-items:center;gap:10px;background:#fff5f5;border:1px solid #f3c9c9;border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:13px}
  .stars{color:var(--gold);font-weight:800}
  .sub{font-size:12px;color:var(--muted)}
  .tag{display:inline-block;background:var(--greenL);color:var(--green);font-size:11px;font-weight:700;padding:2px 9px;border-radius:30px}
</style>
</head>
<body>
<aside>
  <div class="brand"><span class="logo">AA</span> لوحة إدارة AAFED</div>
  <nav id="nav">
    <a data-s="overview" class="on">▦ نظرة عامة</a>
    <a data-s="notifications">🔔 التنبيهات</a>
    <a data-s="media">🎬 القسم الإعلامي</a>
    <a data-s="crm">👥 المتعاونون (CRM)</a>
    <a data-s="pulse">📍 أخبار موزمبيق</a>
    <a data-s="content">📰 القصص والأخبار</a>
    <a data-s="feedback">⭐ تقييم المتبرّعين</a>
  </nav>
</aside>

<main>
  <div class="top">
    <h1 id="title">نظرة عامة</h1>
    <div class="api">API:
      <input id="api" value="http://localhost:4000/api">
      <button class="btn" onclick="reload()">تحديث</button>
    </div>
  </div>
  <div id="view"></div>
</main>

<script>
const $ = (id) => document.getElementById(id);
const api = () => $('api').value.replace(/\/$/, '');
let current = 'overview';

const TITLES = { overview:'نظرة عامة', notifications:'التنبيهات', media:'القسم الإعلامي',
  crm:'المتعاونون (CRM)', pulse:'أخبار من موزمبيق', content:'القصص والأخبار', feedback:'تقييم المتبرّعين' };

async function getJSON(path){
  const r = await fetch(api()+path);
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
function statusPill(s, label){
  const c = s==='delayed'?'bad':s==='at_risk'?'warn':'ok';
  return `<span class="pill ${c}">${label||s}</span>`;
}
const esc = (t)=> (t??'').toString().replace(/[<>&]/g, m=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[m]));

const RENDER = {
  async overview(){
    const d = await getJSON('/dashboard/overview');
    const k = d.kpis||{};
    let h = `<div class="kpis">
      <div class="kpi"><div class="n">${k.projects??0}</div><div class="l">مشاريع</div></div>
      <div class="kpi"><div class="n">${k.donors??0}</div><div class="l">متبرّعون</div></div>
      <div class="kpi"><div class="n">${((k.raised_minor??0)/100).toLocaleString()}$</div><div class="l">إجمالي التبرّعات</div></div>
      <div class="kpi"><div class="n">${k.unread_notifications??0}</div><div class="l">تنبيهات غير مقروءة</div></div>
    </div>`;
    h += `<div class="card"><h2>تنبيهات التأخّر</h2>`;
    h += (d.alerts&&d.alerts.length) ? d.alerts.map(a=>
      `<div class="alert">⚠️ <b>${esc(a.title_ar)}</b> — ${statusPill(a.status,a.status_label)} ${a.delay_days>0?`(متأخّر ${a.delay_days} يوم)`:''}</div>`
    ).join('') : `<div class="empty">لا توجد مشاريع متأخّرة 👍</div>`;
    h += `</div><div class="card"><h2>حالة المشاريع</h2><table>
      <tr><th>المشروع</th><th>التقدّم</th><th>الحالة</th></tr>` +
      (d.projects||[]).map(p=>`<tr><td>${esc(p.title_ar)}</td>
        <td><span class="bar"><i style="width:${p.progress}%"></i></span> ${p.progress}%</td>
        <td>${statusPill(p.status,p.status_label)}</td></tr>`).join('') + `</table></div>`;
    return h;
  },
  async notifications(){
    const rows = await getJSON('/notifications');
    if(!rows.length) return `<div class="card empty">لا توجد تنبيهات</div>`;
    return `<div class="card"><table><tr><th>النوع</th><th>التنبيه</th><th>المشروع</th><th>الحالة</th></tr>`+
      rows.map(n=>`<tr><td><span class="pill ${n.severity==='warning'?'warn':'info'}">${esc(n.type)}</span></td>
      <td><b>${esc(n.title_ar)}</b><div class="sub">${esc(n.body_ar)}</div></td>
      <td>${esc(n.project_title||'-')}</td>
      <td>${n.is_read?'مقروء':'<b>جديد</b>'}</td></tr>`).join('')+`</table></div>`;
  },
  async media(){
    const [need, unpub] = await Promise.all([getJSON('/media/needs-shooting'), getJSON('/media/unpublished')]);
    const list = (rows, empty) => rows.length ? `<table><tr><th>المشروع</th><th>النوع</th><th>ملاحظات</th><th>الحالة</th></tr>`+
      rows.map(m=>`<tr><td>${esc(m.project_title)}</td><td><span class="tag">${m.need_type==='video'?'فيديو':'فوتو'}</span></td>
      <td>${esc(m.notes)}</td><td><span class="pill ${m.status==='needed'?'warn':'info'}">${esc(m.status)}</span></td></tr>`).join('')+`</table>` : `<div class="empty">${empty}</div>`;
    return `<div class="card"><h2>مشاريع محتاجة تصوير</h2>${list(need,'لا شيء')}</div>
            <div class="card"><h2>تمّ تصويره ولم يُنشر بعد</h2>${list(unpub,'لا شيء')}</div>`;
  },
  async crm(){
    const rows = await getJSON('/crm/collaborators');
    if(!rows.length) return `<div class="card empty">لا يوجد متعاونون</div>`;
    return `<div class="card"><h2>المتعاونون (أفراد وجمعيات)</h2><table>
      <tr><th>الاسم</th><th>النوع</th><th>التواصل</th><th>المشاريع</th><th>ملاحظات</th></tr>`+
      rows.map(c=>`<tr><td><b>${esc(c.name)}</b></td>
      <td><span class="tag">${c.type==='organization'?'جمعية':'فرد'}</span></td>
      <td class="sub">${esc(c.contact)}</td><td>${c.projects_count}</td>
      <td class="sub">${esc(c.notes)}</td></tr>`).join('')+`</table></div>`;
  },
  async pulse(){
    const rows = await getJSON('/content/country-pulse');
    if(!rows.length) return `<div class="card empty">لا توجد أخبار</div>`;
    const p = (s)=> s==='positive'?'ok':s==='concern'?'bad':'info';
    const lab = (s)=> s==='positive'?'إيجابي':s==='concern'?'مقلق':'محايد';
    return `<div class="card"><h2>النبض العام — موزمبيق</h2>`+
      rows.map(n=>`<div class="alert" style="background:#fff;border-color:var(--line)">
      <span class="pill ${p(n.pulse)}">${lab(n.pulse)}</span>
      <div><b>${esc(n.headline_ar)}</b><div class="sub">${esc(n.body_ar)} · ${(n.pulse_date||'').split('T')[0]}</div></div></div>`).join('')+`</div>`;
  },
  async content(){
    const [stories, news] = await Promise.all([getJSON('/content/stories'), getJSON('/content/news')]);
    const sList = stories.length ? stories.map(s=>`<div class="alert" style="background:#fff;border-color:var(--line)">
      <span class="pill ${s.published?'ok':'warn'}">${s.published?'منشور':'غير منشور'}</span>
      <div><b>${esc(s.title_ar)}</b><div class="sub">${esc(s.body_ar)}</div></div></div>`).join('') : `<div class="empty">لا قصص</div>`;
    const nList = news.length ? news.map(n=>`<div class="alert" style="background:#fff;border-color:var(--line)">
      <span class="pill info">${esc(n.status)}</span>
      <div><b>${esc(n.title_ar)}</b><div class="sub">${esc(n.body_ar)} · ${esc(n.project_title||'')}</div></div></div>`).join('') : `<div class="empty">لا أخبار</div>`;
    return `<div class="card"><h2>القصص الإنسانية</h2>${sList}</div>
            <div class="card"><h2>اقتراحات أخبار المشاريع</h2>${nList}</div>`;
  },
  async feedback(){
    const d = await getJSON('/feedback');
    const s = d.summary||{};
    let h = `<div class="kpis">
      <div class="kpi"><div class="n stars">${s.avg_org??'-'} ★</div><div class="l">تقييم الجمعية</div></div>
      <div class="kpi"><div class="n stars">${s.avg_reports??'-'} ★</div><div class="l">تقييم التقارير</div></div>
      <div class="kpi"><div class="n">${s.total??0}</div><div class="l">عدد التقييمات</div></div>
    </div><div class="card"><h2>اقتراحات التعديل من المتبرّعين</h2>`;
    h += (d.suggestions&&d.suggestions.length) ? d.suggestions.map(x=>
      `<div class="alert" style="background:#fff;border-color:var(--line)">💬 <div><b>${esc(x.donor_name||'متبرّع')}</b><div class="sub">${esc(x.suggestion_ar)}</div></div></div>`
    ).join('') : `<div class="empty">لا اقتراحات</div>`;
    return h+`</div>`;
  },
};

async function show(section){
  current = section;
  $('title').textContent = TITLES[section];
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('on', a.dataset.s===section));
  $('view').innerHTML = `<div class="card empty">جارٍ التحميل…</div>`;
  try { $('view').innerHTML = await RENDER[section](); }
  catch(e){ $('view').innerHTML = `<div class="card"><b>تعذّر الاتصال بالـ API.</b>
    <div class="sub">تأكّد أن الباكند يعمل (npm run dev) وأن العنوان صحيح: ${api()}</div></div>`; }
}
function reload(){ show(current); }
$('nav').addEventListener('click', e=>{ const a=e.target.closest('a'); if(a) show(a.dataset.s); });
show('overview');
</script>
</body>
</html>
